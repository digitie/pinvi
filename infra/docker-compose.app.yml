# Pinvi app smoke compose — API + Web + Postgres + RustFS.
# `docs/runbooks/docker-app.md`.

services:
  app-postgres:
    image: postgis/postgis:16-3.5-alpine
    environment:
      POSTGRES_USER: pinvi
      # smoke 기본값 — 운영은 infra/.env.prod 로 override(PINVI_DATABASE_URL 과 일치시킬 것).
      POSTGRES_PASSWORD: ${PINVI_POSTGRES_PASSWORD:-pinvi_app_smoke}
      POSTGRES_DB: pinvi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinvi -d pinvi"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
    ports:
      - "${PINVI_RUSTFS_PORT:-12101}:9000"
      - "${PINVI_RUSTFS_CONSOLE_PORT:-12105}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-rustfs-init:
    image: minio/mc:latest
    depends_on:
      app-rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://app-rustfs:9000 rustfsadmin rustfsadmin;
      mc mb -p local/pinvi-media || true;
      "

  app-api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: ${PINVI_API_IMAGE:-pinvi-api:local}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app-postgres:
        condition: service_healthy
      app-rustfs:
        condition: service_healthy
    environment:
      # smoke 기본값 — 운영은 infra/.env.prod 의 ${...} override 로 도메인/시크릿 주입(ADR-047).
      # 내부 endpoint(app-rustfs:9000)는 compose 내부망이라 override 대상 아님.
      PINVI_ENVIRONMENT: ${PINVI_ENVIRONMENT:-smoke}
      PINVI_DATABASE_URL: ${PINVI_DATABASE_URL:-postgresql+asyncpg://pinvi:pinvi_app_smoke@app-postgres:5432/pinvi}
      PINVI_JWT_SECRET_KEY: ${PINVI_JWT_SECRET_KEY:-pinvi-smoke-jwt-secret-32-bytes-minimum}
      PINVI_MCP_JWT_SECRET: ${PINVI_MCP_JWT_SECRET:-pinvi-smoke-jwt-secret-32-bytes-minimum}
      PINVI_RESEND_API_KEY: ${PINVI_RESEND_API_KEY:-}
      PINVI_WEB_BASE_URL: ${PINVI_WEB_BASE_URL:-http://127.0.0.1:12805}
      PINVI_OAUTH_CALLBACK_BASE_URL: ${PINVI_OAUTH_CALLBACK_BASE_URL:-http://127.0.0.1:12801}
      PINVI_RUSTFS_ENDPOINT_URL: http://app-rustfs:9000
      PINVI_RUSTFS_PUBLIC_ENDPOINT_URL: ${PINVI_RUSTFS_PUBLIC_ENDPOINT_URL:-http://127.0.0.1:12101}
      PINVI_RUSTFS_PUBLIC_BASE_URL: ${PINVI_RUSTFS_PUBLIC_BASE_URL:-}
      PINVI_RUSTFS_BUCKET: pinvi-media
      PINVI_RUSTFS_ACCESS_KEY_ID: ${PINVI_RUSTFS_ACCESS_KEY_ID:-rustfsadmin}
      PINVI_RUSTFS_SECRET_ACCESS_KEY: ${PINVI_RUSTFS_SECRET_ACCESS_KEY:-rustfsadmin}
      PINVI_CORS_ALLOWED_ORIGINS: '${PINVI_CORS_ALLOWED_ORIGINS:-["http://127.0.0.1:12805"]}'
      PINVI_GEOFENCE_ENABLED: ${PINVI_GEOFENCE_ENABLED:-false}
      PINVI_GEOFENCE_ALLOWED_COUNTRIES: '${PINVI_GEOFENCE_ALLOWED_COUNTRIES:-["KR"]}'
      PINVI_GEOFENCE_COUNTRY_HEADER: ${PINVI_GEOFENCE_COUNTRY_HEADER:-CF-IPCountry}
      PINVI_GEOFENCE_TRUSTED_PROXY_HEADER: ${PINVI_GEOFENCE_TRUSTED_PROXY_HEADER:-X-Pinvi-Geofence-Proxy}
      PINVI_GEOFENCE_TRUSTED_PROXY_SECRET: ${PINVI_GEOFENCE_TRUSTED_PROXY_SECRET:-}
      PINVI_GEOFENCE_TRUSTED_PROXY_CIDRS: '${PINVI_GEOFENCE_TRUSTED_PROXY_CIDRS:-[]}'
      PINVI_GEOFENCE_MTLS_VERIFIED_HEADER: ${PINVI_GEOFENCE_MTLS_VERIFIED_HEADER:-}
      PINVI_GEOFENCE_MTLS_VERIFIED_VALUE: ${PINVI_GEOFENCE_MTLS_VERIFIED_VALUE:-SUCCESS}
      PINVI_GEOFENCE_BLOCK_UNKNOWN: ${PINVI_GEOFENCE_BLOCK_UNKNOWN:-false}
      PINVI_GEOFENCE_BYPASS_PATHS: '${PINVI_GEOFENCE_BYPASS_PATHS:-["/health","/health/db","/metrics","/docs","/redoc","/openapi.json"]}'
      PINVI_SENTRY_ENVIRONMENT: ${PINVI_SENTRY_ENVIRONMENT:-smoke}
      PINVI_RATE_LIMIT_BACKEND: ${PINVI_RATE_LIMIT_BACKEND:-auto}
      # ADR-035: Trip WebSocket broker는 process-local in-memory다. Redis/LISTEN fan-out 전까지
      # API worker는 1로 고정한다. 값을 올리면 HTTP mutation broadcast가 다른 worker의 WebSocket에
      # 전달되지 않는다.
      PINVI_API_WORKERS: ${PINVI_API_WORKERS:-1}
      PINVI_VWORLD_API_KEY: ${PINVI_VWORLD_API_KEY:-}
      PINVI_BOOTSTRAP_ADMIN_EMAIL: ${PINVI_BOOTSTRAP_ADMIN_EMAIL:-bootstrap-admin@example.com}
      PINVI_BOOTSTRAP_ADMIN_PASSWORD: ${PINVI_BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - "${PINVI_API_PORT:-12801}:8000"

  app-web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # 운영은 infra/.env.prod 의 NEXT_PUBLIC_* 값(빌드타임 embed)로 override.
        NEXT_PUBLIC_PINVI_API_URL: ${NEXT_PUBLIC_PINVI_API_URL:-http://127.0.0.1:${PINVI_API_PORT:-12801}}
        NEXT_PUBLIC_GRAFANA_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://127.0.0.1:${PINVI_GRAFANA_PORT:-12205}}
        NEXT_PUBLIC_GRAFANA_DASHBOARD_PATH: "${NEXT_PUBLIC_GRAFANA_DASHBOARD_PATH:-/d/pinvi/overview?orgId=1&kiosk=tv}"
        NEXT_PUBLIC_PINVI_RESTORE_HOTSWAP_UI_ENABLED: ${NEXT_PUBLIC_PINVI_RESTORE_HOTSWAP_UI_ENABLED:-0}
        NEXT_PUBLIC_VWORLD_API_KEY: ${NEXT_PUBLIC_VWORLD_API_KEY:-}
    image: ${PINVI_WEB_IMAGE:-pinvi-web:local}
    environment:
      PINVI_GRAFANA_HEALTH_URL: ${PINVI_GRAFANA_HEALTH_URL:-http://grafana:3000}
    depends_on:
      - app-api
    ports:
      - "${PINVI_WEB_PORT:-12805}:3000"

  # Dagster webserver — 고정 포트 12802(컨테이너/호스트 동일). profile "etl"로만 기동.
  # reverse proxy: pinvi-dagster.<domain> → host :12802.
  app-dagster:
    profiles: ["etl"]
    build:
      context: ..
      dockerfile: apps/etl/Dockerfile
    image: ${PINVI_DAGSTER_IMAGE:-pinvi-dagster:local}
    container_name: pinvi-app-dagster
    restart: unless-stopped
    depends_on:
      app-postgres:
        condition: service_healthy
    environment:
      PINVI_DATABASE_URL: ${PINVI_DATABASE_URL:-postgresql+asyncpg://pinvi:pinvi_app_smoke@app-postgres:5432/pinvi}
      PINVI_RUSTFS_ENDPOINT_URL: http://app-rustfs:9000
      PINVI_RUSTFS_BUCKET: pinvi-media
      PINVI_RUSTFS_ACCESS_KEY_ID: ${PINVI_RUSTFS_ACCESS_KEY_ID:-rustfsadmin}
      PINVI_RUSTFS_SECRET_ACCESS_KEY: ${PINVI_RUSTFS_SECRET_ACCESS_KEY:-rustfsadmin}
      DATA_GO_KR_SERVICE_KEY: ${DATA_GO_KR_SERVICE_KEY:-}
      DAGSTER_HOME: /opt/pinvi/.dagster
    ports:
      - "${PINVI_DAGSTER_DEV_PORT:-12802}:12802"
    volumes:
      - app-dagster:/opt/pinvi/.dagster

  cadvisor:
    profiles: ["observability"]
    image: ${PINVI_CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.52.1}
    container_name: pinvi-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      - "${PINVI_CADVISOR_PORT:-12301}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  blackbox:
    profiles: ["observability"]
    image: ${PINVI_BLACKBOX_IMAGE:-prom/blackbox-exporter:v0.25.0}
    container_name: pinvi-app-blackbox
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  prometheus:
    profiles: ["observability"]
    image: ${PINVI_PROMETHEUS_IMAGE:-prom/prometheus:v2.53.1}
    container_name: pinvi-prometheus
    restart: unless-stopped
    user: "${PINVI_PROMETHEUS_RUN_AS_USER:-0}"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "${PINVI_PROMETHEUS_PORT:-12401}:9090"
    volumes:
      - ./prometheus/prometheus.app.yml:/etc/prometheus/prometheus.yml:ro
      - app-prometheus:/prometheus
    depends_on:
      app-api:
        condition: service_started
      cadvisor:
        condition: service_started
      blackbox:
        condition: service_started

  grafana:
    profiles: ["observability"]
    image: ${PINVI_GRAFANA_IMAGE:-grafana/grafana:11.1.4}
    container_name: pinvi-grafana
    restart: unless-stopped
    user: "${PINVI_GRAFANA_RUN_AS_USER:-0}"
    environment:
      GF_SECURITY_ADMIN_USER: ${PINVI_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${PINVI_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://127.0.0.1:${PINVI_GRAFANA_PORT:-12205}}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${PINVI_GRAFANA_PORT:-12205}:3000"
    volumes:
      - app-grafana:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  app-prometheus:
  app-grafana:
  app-dagster:
