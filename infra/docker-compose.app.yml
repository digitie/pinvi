# Pinvi app smoke compose — API + Web + Postgres + RustFS.
# `docs/runbooks/docker-app.md`.

services:
  app-postgres:
    image: postgis/postgis:16-3.5-alpine
    environment:
      POSTGRES_USER: pinvi
      POSTGRES_PASSWORD: pinvi_app_smoke
      POSTGRES_DB: pinvi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinvi -d pinvi"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: ":12101"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":12105"
    ports:
      - "${PINVI_RUSTFS_PORT:-12101}:12101"
      - "${PINVI_RUSTFS_CONSOLE_PORT:-12105}:12105"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:12101/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-rustfs-init:
    image: minio/mc:latest
    depends_on:
      app-rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://app-rustfs:12101 rustfsadmin rustfsadmin;
      mc mb -p local/pinvi-media || true;
      "

  app-api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: pinvi-api:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app-postgres:
        condition: service_healthy
      app-rustfs:
        condition: service_healthy
    environment:
      PINVI_ENVIRONMENT: smoke
      PINVI_DATABASE_URL: postgresql+asyncpg://pinvi:pinvi_app_smoke@app-postgres:5432/pinvi
      PINVI_JWT_SECRET_KEY: pinvi-smoke-jwt-secret-32-bytes-minimum
      PINVI_RESEND_API_KEY: ""
      PINVI_RUSTFS_ENDPOINT_URL: http://app-rustfs:12101
      PINVI_RUSTFS_PUBLIC_ENDPOINT_URL: http://127.0.0.1:12101
      PINVI_RUSTFS_BUCKET: pinvi-media
      PINVI_RUSTFS_ACCESS_KEY_ID: rustfsadmin
      PINVI_RUSTFS_SECRET_ACCESS_KEY: rustfsadmin
      PINVI_CORS_ALLOWED_ORIGINS: '["http://127.0.0.1:12505"]'
    ports:
      - "${PINVI_API_PORT:-12501}:8000"

  app-web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_PINVI_API_URL: http://127.0.0.1:${PINVI_API_PORT:-12501}
    image: pinvi-web:local
    depends_on:
      - app-api
    ports:
      - "${PINVI_WEB_PORT:-12505}:3000"

  cadvisor:
    profiles: ["observability"]
    image: ${PINVI_CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.52.1}
    container_name: pinvi-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      - "${PINVI_CADVISOR_PORT:-12602}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  prometheus:
    profiles: ["observability"]
    image: ${PINVI_PROMETHEUS_IMAGE:-prom/prometheus:v2.53.1}
    container_name: pinvi-prometheus
    restart: unless-stopped
    user: "${PINVI_PROMETHEUS_RUN_AS_USER:-0}"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "${PINVI_PROMETHEUS_PORT:-12601}:9090"
    volumes:
      - ./prometheus/prometheus.app.yml:/etc/prometheus/prometheus.yml:ro
      - app-prometheus:/prometheus
    depends_on:
      app-api:
        condition: service_started
      cadvisor:
        condition: service_started

  grafana:
    profiles: ["observability"]
    image: ${PINVI_GRAFANA_IMAGE:-grafana/grafana:11.1.4}
    container_name: pinvi-grafana
    restart: unless-stopped
    user: "${PINVI_GRAFANA_RUN_AS_USER:-0}"
    environment:
      GF_SECURITY_ADMIN_USER: ${PINVI_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${PINVI_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${PINVI_GRAFANA_PORT:-12605}:3000"
    volumes:
      - app-grafana:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  app-prometheus:
  app-grafana:
