name: PR Review Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: pr-review-monitor
  cancel-in-progress: false

jobs:
  remind:
    name: Post missing MCP review reminders
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout monitor script
        uses: actions/checkout@v4

      - name: Post missing review reminders
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/pr_review_monitor.py --repo "$GITHUB_REPOSITORY"
