services:
  app-postgres:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: tripmate
      POSTGRES_USER: tripmate
      POSTGRES_PASSWORD: tripmate_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripmate -d tripmate"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app-rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-tripmate-dev-access}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-tripmate-dev-secret-change-me}
      RUSTFS_CONSOLE_ENABLE: "true"
    command: ["--address", ":9000", "--console-enable", "/data"]
    ports:
      - "${TRIPMATE_RUSTFS_PORT:-19000}:9000"
      - "${TRIPMATE_RUSTFS_CONSOLE_PORT:-19001}:9001"
    volumes:
      - app_rustfs_data:/data
    restart: unless-stopped

  app-rustfs-init:
    image: minio/mc:latest
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-tripmate-dev-access}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-tripmate-dev-secret-change-me}
      TRIPMATE_RUSTFS_BUCKET: ${TRIPMATE_RUSTFS_BUCKET:-tripmate-media}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for i in $$(seq 1 30); do
          if mc alias set rustfs http://app-rustfs:9000 "$$RUSTFS_ACCESS_KEY" "$$RUSTFS_SECRET_KEY"; then
            mc mb -p "rustfs/$$TRIPMATE_RUSTFS_BUCKET" || true
            exit 0
          fi
          sleep 2
        done
        exit 1
    depends_on:
      - app-rustfs

  app-api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    image: tripmate-api:local
    environment:
      TRIPMATE_DATABASE_URL: postgresql+psycopg://tripmate:tripmate_dev_password@app-postgres:5432/tripmate
      TRIPMATE_CORS_ORIGINS: '["http://localhost:${TRIPMATE_WEB_PORT:-13082}","http://127.0.0.1:${TRIPMATE_WEB_PORT:-13082}"]'
      TRIPMATE_RUSTFS_ENDPOINT_URL: http://app-rustfs:9000
      TRIPMATE_RUSTFS_PUBLIC_ENDPOINT_URL: http://127.0.0.1:${TRIPMATE_RUSTFS_PORT:-19000}
      TRIPMATE_RUSTFS_BUCKET: ${TRIPMATE_RUSTFS_BUCKET:-tripmate-media}
      TRIPMATE_RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-tripmate-dev-access}
      TRIPMATE_RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-tripmate-dev-secret-change-me}
    ports:
      - "${TRIPMATE_API_PORT:-18082}:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    depends_on:
      app-postgres:
        condition: service_healthy
      app-rustfs-init:
        condition: service_completed_successfully

  app-web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_TRIPMATE_API_URL: ${NEXT_PUBLIC_TRIPMATE_API_URL:-http://127.0.0.1:18082}
        NEXT_PUBLIC_TRIPMATE_DAGSTER_URL: ${NEXT_PUBLIC_TRIPMATE_DAGSTER_URL:-http://127.0.0.1:23000}
    image: tripmate-web:local
    environment:
      NEXT_PUBLIC_TRIPMATE_API_URL: ${NEXT_PUBLIC_TRIPMATE_API_URL:-http://127.0.0.1:18082}
      NEXT_PUBLIC_TRIPMATE_DAGSTER_URL: ${NEXT_PUBLIC_TRIPMATE_DAGSTER_URL:-http://127.0.0.1:23000}
    ports:
      - "${TRIPMATE_WEB_PORT:-13082}:3000"
    restart: unless-stopped
    depends_on:
      app-api:
        condition: service_healthy

volumes:
  app_postgres_data:
  app_rustfs_data:
