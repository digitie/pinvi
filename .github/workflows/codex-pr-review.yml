name: PR Review Reminder

on:
  pull_request:
    types: [opened, ready_for_review]

permissions: {}

concurrency:
  group: pr-review-reminder-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  reminder:
    name: Post review reminder
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Comment with review checklist
        uses: actions/github-script@v7
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = [
              "## 리뷰 필요",
              "",
              "이 저장소는 GitHub Actions에서 외부 LLM API key를 사용하지 않습니다.",
              "PR 리뷰는 `docs/runbooks/pr-review-sprint4.md` 기준으로 에이전트 또는 사람이 직접 수행해야 합니다.",
              "",
              "필수 확인:",
              "- 변경분만 리뷰하고 차단 이슈를 먼저 기록",
              "- ADR / Sprint 목표 / 책임 경계 위반 여부 확인",
              "- 필요한 테스트와 문서 추적 파일 갱신 확인",
              "- 검증 결과와 머지 판단을 PR에 남김",
              "",
              `<!-- pr-review-reminder:head=${process.env.PR_HEAD_SHA} -->`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
