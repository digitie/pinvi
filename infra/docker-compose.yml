x-dagster-common: &dagster-common
  build:
    context: ../apps/api
    dockerfile: Dockerfile
  image: tripmate-api:local
  working_dir: /app
  environment: &dagster-common-env
    DAGSTER_HOME: /opt/dagster/dagster_home
    PYTHONPATH: /app
    TRIPMATE_API_DIR: /app
    TRIPMATE_DATABASE_URL: postgresql+psycopg://tripmate:tripmate_dev_password@postgres:5432/tripmate
    TRIPMATE_DAGSTER_DOWNLOAD_DIR: /opt/tripmate/.tmp/dagster-downloads
    TRIPMATE_DAGSTER_LOG_DIR: /opt/tripmate/.tmp/dagster-logs
    TRIPMATE_ETL_CONFIG_PATH: ${TRIPMATE_ETL_CONFIG_PATH:-/opt/tripmate/config/etl-datasets.json}
    TRIPMATE_KMA_MID_TERM_REGION_CONFIG_PATH: /opt/tripmate/config/kma-mid-term-regions.json
    TRIPMATE_DATA_GO_SERVICE_KEY: ${TRIPMATE_DATA_GO_SERVICE_KEY:-}
    TRIPMATE_KMA_SHORT_TERM_REQUEST_DELAY_SECONDS: ${TRIPMATE_KMA_SHORT_TERM_REQUEST_DELAY_SECONDS:-1.0}
    TRIPMATE_KMA_SHORT_TERM_RATE_LIMIT_MAX_RETRIES: ${TRIPMATE_KMA_SHORT_TERM_RATE_LIMIT_MAX_RETRIES:-2}
    TRIPMATE_KMA_SHORT_TERM_RATE_LIMIT_BACKOFF_SECONDS: ${TRIPMATE_KMA_SHORT_TERM_RATE_LIMIT_BACKOFF_SECONDS:-300}
    TRIPMATE_KHOA_API_KEY: ${TRIPMATE_KHOA_API_KEY:-}
    TRIPMATE_MOF_BEACH_SERVICE_KEY: ${TRIPMATE_MOF_BEACH_SERVICE_KEY:-}
    TRIPMATE_OPINET_API_KEY: ${TRIPMATE_OPINET_API_KEY:-}
    TRIPMATE_EXPRESSWAY_API_KEY: ${TRIPMATE_EXPRESSWAY_API_KEY:-}
    TRIPMATE_KMA_TOUR_COURSE_SOURCE_PATH: ${TRIPMATE_KMA_TOUR_COURSE_SOURCE_PATH:-}
  volumes:
    - ../apps/api:/app
    - ../config:/opt/tripmate/config:ro
    - ../dataset:/opt/tripmate/dataset:ro
    - ../.tmp/dagster-downloads:/opt/tripmate/.tmp/dagster-downloads
    - ../.tmp/dagster-logs:/opt/tripmate/.tmp/dagster-logs
    - ../.tmp/etl-soak:/opt/tripmate/.tmp/etl-soak
    - dagster_home:/opt/dagster/dagster_home
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgis/postgis:16-3.5
    container_name: tripmate-postgres
    environment:
      POSTGRES_DB: tripmate
      POSTGRES_USER: tripmate
      POSTGRES_PASSWORD: tripmate_dev_password
    ports:
      - "55432:5432"
    volumes:
      - tripmate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripmate -d tripmate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dagster:
    <<: *dagster-common
    command:
      [
        "dagster",
        "dev",
        "-m",
        "app.dagster_etl.definitions",
        "-h",
        "0.0.0.0",
        "-p",
        "3000",
      ]
    ports:
      - "${TRIPMATE_DAGSTER_PORT:-23000}:3000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  tripmate_postgres_data:
  dagster_home:
