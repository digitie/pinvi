# TripMate dev compose — PostgreSQL/PostGIS + RustFS + (옵션) Dagster.
# `docs/runbooks/local-dev.md` §8.

services:
  postgres:
    image: postgis/postgis:16-3.5-alpine
    container_name: tripmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripmate
      POSTGRES_PASSWORD: tripmate_dev_password
      POSTGRES_DB: tripmate
    ports:
      - "5432:5432"
    volumes:
      - tripmate-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripmate -d tripmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: tripmate-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: ":12101"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":12105"
    ports:
      - "12101:12101"
      - "12105:12105"
    volumes:
      - tripmate-rustfs:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:12101/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://rustfs:12101 rustfsadmin rustfsadmin;
      mc mb -p local/tripmate-media || true;
      "

  # Sprint 5에서 활성화. Sprint 1은 컨테이너 정의만.
  dagster:
    profiles: ["etl"]
    build:
      context: ..
      dockerfile: apps/etl/Dockerfile
    container_name: tripmate-dagster
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRIPMATE_DATABASE_URL: postgresql+asyncpg://tripmate:tripmate_dev_password@postgres:5432/tripmate
      TRIPMATE_RUSTFS_ENDPOINT_URL: http://rustfs:12101
      TRIPMATE_RUSTFS_BUCKET: tripmate-media
      TRIPMATE_RUSTFS_ACCESS_KEY_ID: rustfsadmin
      TRIPMATE_RUSTFS_SECRET_ACCESS_KEY: rustfsadmin
      DATA_GO_KR_SERVICE_KEY: ${DATA_GO_KR_SERVICE_KEY:-}
      TRIPMATE_KASI_SPECIAL_DAYS_LOOKBACK_MONTHS: ${TRIPMATE_KASI_SPECIAL_DAYS_LOOKBACK_MONTHS:-6}
      TRIPMATE_KASI_SPECIAL_DAYS_LOOKAHEAD_MONTHS: ${TRIPMATE_KASI_SPECIAL_DAYS_LOOKAHEAD_MONTHS:-18}
      DAGSTER_HOME: /opt/tripmate/.tmp/dagster
    ports:
      - "9023:3000"
    volumes:
      - ../apps/etl:/opt/tripmate/apps/etl
      - tripmate-dagster:/opt/tripmate/.tmp/dagster

volumes:
  tripmate-pgdata:
  tripmate-rustfs:
  tripmate-dagster:
