x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: infra/airflow/Dockerfile
  image: tripmate-airflow:local
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET:-tripmate_local_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW_API_AUTH_JWT_ISSUER:-tripmate}
    AIRFLOW__CELERY_BROKER_TRANSPORT_OPTIONS__VISIBILITY_TIMEOUT: "21600"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/tripmate/apps/api
    TRIPMATE_API_DIR: /opt/tripmate/apps/api
    TRIPMATE_DATABASE_URL: postgresql+psycopg://tripmate:tripmate_dev_password@postgres:5432/tripmate
    TRIPMATE_AIRFLOW_DOWNLOAD_DIR: /opt/tripmate/.tmp/airflow-downloads
    TRIPMATE_AIRFLOW_LOG_DIR: /opt/tripmate/.tmp/airflow-logs
    TRIPMATE_ETL_CONFIG_PATH: ${TRIPMATE_ETL_CONFIG_PATH:-/opt/tripmate/config/etl-datasets.json}
    TRIPMATE_KMA_MID_TERM_REGION_CONFIG_PATH: /opt/tripmate/config/kma-mid-term-regions.json
    TRIPMATE_DATA_GO_SERVICE_KEY: ${TRIPMATE_DATA_GO_SERVICE_KEY:-}
    TRIPMATE_KMA_SHORT_TERM_REQUEST_DELAY_SECONDS: ${TRIPMATE_KMA_SHORT_TERM_REQUEST_DELAY_SECONDS:-1.0}
    TRIPMATE_KHOA_API_KEY: ${TRIPMATE_KHOA_API_KEY:-}
    TRIPMATE_MOF_BEACH_SERVICE_KEY: ${TRIPMATE_MOF_BEACH_SERVICE_KEY:-}
    TRIPMATE_OPINET_API_KEY: ${TRIPMATE_OPINET_API_KEY:-}
    TRIPMATE_EXPRESSWAY_API_KEY: ${TRIPMATE_EXPRESSWAY_API_KEY:-}
    TRIPMATE_KMA_TOUR_COURSE_SOURCE_PATH: ${TRIPMATE_KMA_TOUR_COURSE_SOURCE_PATH:-}
  volumes:
    - ../dags:/opt/airflow/dags:ro
    - ../apps/api:/opt/tripmate/apps/api:ro
    - ../config:/opt/tripmate/config:ro
    - ../dataset:/opt/tripmate/dataset:ro
    - ../.tmp/airflow-downloads:/opt/tripmate/.tmp/airflow-downloads
    - ../.tmp/airflow-logs:/opt/tripmate/.tmp/airflow-logs
    - airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy
    airflow-redis:
      condition: service_healthy

services:
  postgres:
    image: postgis/postgis:16-3.5
    container_name: tripmate-postgres
    environment:
      POSTGRES_DB: tripmate
      POSTGRES_USER: tripmate
      POSTGRES_PASSWORD: tripmate_dev_password
    ports:
      - "55432:5432"
    volumes:
      - tripmate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripmate -d tripmate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-redis:
    image: redis:7.2-bookworm
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/tripmate/.tmp/airflow-downloads
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/logs /opt/tripmate/.tmp/airflow-downloads
        /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "28080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d \"celery@$${HOSTNAME}\" || celery --app airflow.executors.celery_executor.app inspect ping -d \"celery@$${HOSTNAME}\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-webserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  tripmate_postgres_data:
  airflow_postgres_data:
  airflow_logs:
