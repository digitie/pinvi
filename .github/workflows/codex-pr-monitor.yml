name: PR Review Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: pr-review-monitor
  cancel-in-progress: false

jobs:
  discover:
    name: Discover pull requests needing review
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    outputs:
      has_prs: ${{ steps.discover.outputs.has_prs }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Find open PRs without current review reminder
        id: discover
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const include = [];
            for (const pr of prs) {
              if (pr.draft) {
                continue;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100,
              });

              const marker = `pr-review-reminder:head=${pr.head.sha}`;
              const alreadyReminded = comments.some((comment) => comment.body?.includes(marker));
              if (alreadyReminded) {
                continue;
              }

              include.push({
                pr_number: pr.number,
                base_ref: pr.base.ref,
                base_sha: pr.base.sha,
                head_sha: pr.head.sha,
                title: pr.title,
                body: pr.body || "",
              });
            }

            core.setOutput("has_prs", include.length > 0 ? "true" : "false");
            core.setOutput("matrix", JSON.stringify({ include }));

  remind:
    name: Remind PR #${{ matrix.pr_number }}
    needs: discover
    if: needs.discover.outputs.has_prs == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Comment with review checklist
        uses: actions/github-script@v7
        env:
          PR_HEAD_SHA: ${{ matrix.head_sha }}
          PR_NUMBER: ${{ matrix.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = [
              "## 리뷰 필요",
              "",
              "이 저장소는 GitHub Actions에서 외부 LLM API key를 사용하지 않습니다.",
              "PR 리뷰는 `docs/runbooks/pr-review-sprint4.md` 기준으로 에이전트 또는 사람이 직접 수행해야 합니다.",
              "",
              "필수 확인:",
              "- 변경분만 리뷰하고 차단 이슈를 먼저 기록",
              "- ADR / Sprint 목표 / 책임 경계 위반 여부 확인",
              "- 필요한 테스트와 문서 추적 파일 갱신 확인",
              "- 검증 결과와 머지 판단을 PR에 남김",
              "",
              `<!-- pr-review-reminder:head=${process.env.PR_HEAD_SHA} -->`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });
