name: mobile

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/mobile.yml"
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - ".github/workflows/mobile.yml"

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-typecheck:
    name: mobile-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck (@pinvi/mobile)
        run: npm --workspace @pinvi/mobile run typecheck
