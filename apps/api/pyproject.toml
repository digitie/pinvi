[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tripmate-api"
version = "0.1.0"
description = "FastAPI backend for TripMate"
requires-python = ">=3.12"
dependencies = [
  "alembic>=1.17.0",
  "fastapi>=0.124.0",
  "geoalchemy2>=0.18.0",
  "psycopg[binary]>=3.3.0",
  "pydantic-settings>=2.12.0",
  "sqlalchemy>=2.0.45",
  "uvicorn[standard]>=0.38.0",
]

[dependency-groups]
dev = [
  "httpx>=0.28.0",
  "mypy>=1.19.0",
  "pytest>=9.0.0",
  "ruff>=0.14.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
plugins = ["sqlalchemy.ext.mypy.plugin"]
strict = true
warn_unused_ignores = true
warn_return_any = true
disallow_any_generics = false

[tool.setuptools.packages.find]
include = ["app*"]
