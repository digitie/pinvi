# 한국 전용 geofencing — nginx server 블록 적용 예시 (ADR-018 / T-268).
#
# geo-kr.conf의 map($geo_block 등)을 먼저 include한 뒤 본 패턴을 server 블록에 반영한다.
# 그대로 쓰지 말고 upstream/server_name/TLS를 배포 환경에 맞춰 치환하고 `nginx -t`로 검증한다.
# 이 계층은 선택(optional)이다 — 기본 배포는 Cloudflare WAF + FastAPI fallback로 충분하다.

upstream pinvi_api {
    server 127.0.0.1:12801;  # 배포 환경의 API upstream으로 치환
}

server {
    listen 80;
    server_name _;  # 실제 도메인으로 치환 (공개 repo에는 도메인 비노출 — ADR-047)

    # KR 외(그리고 bypass 아님) 요청은 451.
    location / {
        if ($geo_block) {
            return 451;
        }
        error_page 451 = @geo_blocked;

        # FastAPI fallback이 신뢰하도록 검증 신호를 주입한다.
        # secret은 리포에 평문 금지 — 마운트한 include로만 주입한다.
        #   set $geofence_proxy_secret "...";  (파일 권한 600, gitignore)
        include /etc/nginx/secrets/geofence-proxy.conf;
        proxy_set_header CF-IPCountry           $resolved_country;
        proxy_set_header X-Pinvi-Geofence-Proxy $geofence_proxy_secret;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header Host                   $host;
        proxy_pass http://pinvi_api;
    }

    # 451 JSON 본문 — FastAPI _blocked_response와 동일한 계약.
    location @geo_blocked {
        default_type application/json;
        add_header X-Pinvi-Geofence "blocked" always;
        return 451 '{"error":{"code":"GEO_BLOCKED","message":"Pinvi는 대한민국 거주자 전용 서비스입니다. (Service available only in Republic of Korea.)"}}';
    }
}
