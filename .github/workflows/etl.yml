name: etl

on:
  pull_request:
    paths:
      - "apps/etl/**"
      - ".github/workflows/etl.yml"
  push:
    branches: [main]
    paths:
      - "apps/etl/**"
      - ".github/workflows/etl.yml"

concurrency:
  group: etl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/etl

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: Dagster definitions load test
        run: pytest tests -q
