# Pinvi DEV compose — PostgreSQL/PostGIS + RustFS + (옵션) Dagster.
# `docs/runbooks/local-dev.md` §8.
#
# dev 기본 네트워크는 **host 모드**(ADR-047): 컨테이너가 호스트 net을 공유해 127.0.0.1의
# 12xxx 고정 포트로 직접 bind한다(포트 remap·서비스 DNS 없음 → 내부 주소는 127.0.0.1:port).
# observability profile(cadvisor/prometheus/grafana)은 metric 스크레이프 타겟 때문에 bridge
# 유지. prod는 이 파일이 아니라 ktdctl + 공식 도메인으로 올린다.

services:
  postgres:
    image: postgis/postgis:16-3.5-alpine
    container_name: pinvi-postgres
    restart: unless-stopped
    network_mode: host          # → 127.0.0.1:5432
    environment:
      POSTGRES_USER: pinvi
      POSTGRES_PASSWORD: pinvi_dev_password
      POSTGRES_DB: pinvi
    volumes:
      - pinvi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinvi -d pinvi"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: pinvi-rustfs
    restart: unless-stopped
    network_mode: host          # → 127.0.0.1:12101 (API) / :12105 (console)
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data
      # host 모드라 remap이 없으므로 12xxx 고정 포트로 직접 bind한다.
      RUSTFS_ADDRESS: ":12101"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":12105"
    volumes:
      - pinvi-rustfs:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:12101/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs-init:
    image: minio/mc:latest
    network_mode: host          # host net이라 rustfs DNS 대신 127.0.0.1:12101
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://127.0.0.1:12101 rustfsadmin rustfsadmin;
      mc mb -p local/pinvi-media || true;
      "

  # Sprint 5에서 활성화. Sprint 1은 컨테이너 정의만.
  dagster:
    profiles: ["etl"]
    build:
      context: ..
      dockerfile: apps/etl/Dockerfile
    container_name: pinvi-dagster
    restart: unless-stopped
    network_mode: host          # webserver는 127.0.0.1:12802로 bind(apps/etl/Dockerfile)
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # host net이라 서비스 DNS 대신 127.0.0.1 사용.
      PINVI_DATABASE_URL: postgresql+asyncpg://pinvi:pinvi_dev_password@127.0.0.1:5432/pinvi
      PINVI_RUSTFS_ENDPOINT_URL: http://127.0.0.1:12101
      PINVI_RUSTFS_BUCKET: pinvi-media
      PINVI_RUSTFS_ACCESS_KEY_ID: rustfsadmin
      PINVI_RUSTFS_SECRET_ACCESS_KEY: rustfsadmin
      DATA_GO_KR_SERVICE_KEY: ${DATA_GO_KR_SERVICE_KEY:-}
      PINVI_KASI_SPECIAL_DAYS_LOOKBACK_MONTHS: ${PINVI_KASI_SPECIAL_DAYS_LOOKBACK_MONTHS:-6}
      PINVI_KASI_SPECIAL_DAYS_LOOKAHEAD_MONTHS: ${PINVI_KASI_SPECIAL_DAYS_LOOKAHEAD_MONTHS:-18}
      DAGSTER_HOME: /opt/pinvi/.tmp/dagster
    volumes:
      - ../apps/etl:/opt/pinvi/apps/etl
      - pinvi-dagster:/opt/pinvi/.tmp/dagster

  cadvisor:
    profiles: ["observability"]
    image: ${PINVI_CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.52.1}
    container_name: pinvi-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      - "${PINVI_CADVISOR_PORT:-12301}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  prometheus:
    profiles: ["observability"]
    image: ${PINVI_PROMETHEUS_IMAGE:-prom/prometheus:v2.53.1}
    container_name: pinvi-prometheus
    restart: unless-stopped
    user: "${PINVI_PROMETHEUS_RUN_AS_USER:-0}"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PINVI_PROMETHEUS_PORT:-12401}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - pinvi-prometheus:/prometheus
    depends_on:
      cadvisor:
        condition: service_started

  grafana:
    profiles: ["observability"]
    image: ${PINVI_GRAFANA_IMAGE:-grafana/grafana:11.1.4}
    container_name: pinvi-grafana
    restart: unless-stopped
    user: "${PINVI_GRAFANA_RUN_AS_USER:-0}"
    environment:
      GF_SECURITY_ADMIN_USER: ${PINVI_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${PINVI_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://127.0.0.1:${PINVI_GRAFANA_PORT:-12205}}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${PINVI_GRAFANA_PORT:-12205}:3000"
    volumes:
      - pinvi-grafana:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  pinvi-pgdata:
  pinvi-rustfs:
  pinvi-dagster:
  pinvi-prometheus:
  pinvi-grafana:
