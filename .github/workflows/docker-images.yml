name: Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override. Defaults to git ref name."
        required: false
        type: string
      next_public_pinvi_api_url:
        description: "NEXT_PUBLIC_PINVI_API_URL embedded into the web image. Leave blank to use the NEXT_PUBLIC_PINVI_API_URL repo secret."
        required: false
        default: ""
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push multi-arch images
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          ref_tag="${GITHUB_REF_NAME}"
          input_tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}"
          tag="${input_tag:-$ref_tag}"
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/${owner}/pinvi-api" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${owner}/pinvi-web" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.api_image }}:${{ github.sha }}
          cache-from: type=gha,scope=pinvi-api
          cache-to: type=gha,mode=max,scope=pinvi-api

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Real prod API domain is NOT committed (public repo). It comes from the
          # NEXT_PUBLIC_PINVI_API_URL repo secret, or the manual dispatch input.
          build-args: |
            NEXT_PUBLIC_PINVI_API_URL=${{ (github.event_name == 'workflow_dispatch' && inputs.next_public_pinvi_api_url) || secrets.NEXT_PUBLIC_PINVI_API_URL || 'https://pinvi-api.example.com' }}
          tags: |
            ${{ steps.meta.outputs.web_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.web_image }}:${{ github.sha }}
          cache-from: type=gha,scope=pinvi-web
          cache-to: type=gha,mode=max,scope=pinvi-web
