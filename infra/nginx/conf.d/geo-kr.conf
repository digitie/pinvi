# 한국 전용 geofencing — nginx 선택 edge 계층 maps (ADR-018 / T-268).
#
# 기본 배포(Cloudflare Tunnel 단일 진입)는 Cloudflare WAF(1차, infra/cloudflare/waf-korea-only.md)
# + FastAPI middleware(fallback, apps/api/app/middleware/geofence.py) 두 계층으로 충분하다.
# 본 conf는 Cloudflare를 우회할 수 있는 공개 nginx edge를 따로 둘 때만 block 계층으로 켠다.
# 기본 배포에서는 켜지 않거나 observe/통계 용도로만 둔다.
#
# 빌드: infra/nginx/Dockerfile (libnginx-mod-http-geoip2 + load_module).
# GeoIP DB: 런타임 볼륨 마운트 + scripts/update-geoip.sh로 월 1회 갱신.
# server 블록 적용 예시: infra/nginx/conf.d/geo-kr-server.example.conf.
# 활성/검증 절차: infra/nginx/README.md, docs/runbooks/korea-only.md.
#
# 본 파일은 http 컨텍스트 include 전용(map 정의). 적용한 뒤 반드시 `nginx -t`로 검증한다.

# 1) 국가 판정 — MaxMind GeoLite2 (standalone edge 기준).
geoip2 /etc/nginx/GeoIP/GeoLite2-Country.mmdb {
    auto_reload 1h;
    $geoip2_country_code source=$remote_addr country iso_code;
}

# Cloudflare가 앞단이면 CF-IPCountry를 신뢰, 없거나 "XX"(미판정)면 geoip2 결과 사용.
map $http_cf_ipcountry $resolved_country {
    default   $http_cf_ipcountry;
    ""        $geoip2_country_code;
    "XX"      $geoip2_country_code;
}

# KR 여부.
map $resolved_country $is_kr {
    default 0;
    KR      1;
}

# 헬스체크/메트릭은 항상 통과 (Cloudflare worker / 모니터가 KR 외 호스팅된 경우 대비).
map $request_uri $is_geo_bypass {
    default              0;
    ~^/api/v1/healthz    1;
    ~^/healthz           1;
    ~^/metrics           1;
}

# 차단 판정 — KR이 아니고(0) bypass도 아닐 때(0)만 block(1).
map "$is_kr:$is_geo_bypass" $geo_block {
    default 0;
    "0:0"   1;
}
