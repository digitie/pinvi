name: Codex PR Review

on:
  pull_request:
    types: [opened, ready_for_review]

permissions: {}

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    name: Review pull request
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}
    steps:
      - name: Checkout pull request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Fetch review refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.

            Review only the changes introduced by this pull request:
              git diff --stat ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}
              git diff --find-renames ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Follow the repository instructions in AGENTS.md, SKILL.md, and docs/agent-guide.md.
            This repository requires Markdown documents to be written in Korean, except for official API field names,
            code identifiers, commands, URLs, library/provider names, and environment variables.

            Until Sprint 4 is completed, review PRs with a long-term architecture stance:
            - Do not optimize for the smallest diff when a structural change is clearly better for Sprint 1-4 goals.
            - Prefer changes that preserve clean module boundaries, dependency direction, and future Sprint 4 map/UI work.
            - If the correct fix belongs in a base library such as python-krtour-map, maplibre-vworld-js,
              python-kraddr-*, or a provider library, call that out as a required upstream library PR before merge.
            - Flag cases where TripMate is adding wrappers, adapters, schema ownership, provider parsing,
              map behavior, or category logic that should live in the owning library instead.

            Use a code-review stance:
            - Prioritize bugs, security risks, behavioral regressions, missing tests, and repository policy violations.
            - Lead with findings ordered by severity.
            - Include exact file paths and line references when possible.
            - Keep the review detailed enough that the next agent can implement the fix without rediscovery.
            - If there are no issues, say so clearly and mention any residual test risk.
            - Include sections for findings, required code changes, base-library sync, verification, and merge readiness.
            - Write the final review comment in Korean.

            Pull request title and body:
            ----
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.body }}

  post-review:
    name: Post review comment
    needs: review
    if: needs.review.outputs.final_message != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Comment with Codex review
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
