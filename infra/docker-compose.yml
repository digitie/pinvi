x-dagster-common: &dagster-common
  build:
    context: ../apps/api
    dockerfile: Dockerfile
  image: tripmate-api:local
  working_dir: /app
  environment: &dagster-common-env
    DAGSTER_HOME: /opt/dagster/dagster_home
    PYTHONPATH: /app
    TRIPMATE_API_DIR: /app
    TRIPMATE_DATABASE_URL: postgresql+psycopg://tripmate:tripmate_dev_password@postgres:5432/tripmate
    TRIPMATE_DAGSTER_DOWNLOAD_DIR: /opt/tripmate/.tmp/dagster-downloads
    TRIPMATE_DAGSTER_LOG_DIR: /opt/tripmate/.tmp/dagster-logs
    TRIPMATE_ETL_CONFIG_PATH: ${TRIPMATE_ETL_CONFIG_PATH:-/opt/tripmate/config/etl-datasets.json}
    TRIPMATE_KMA_MID_TERM_REGION_CONFIG_PATH: /opt/tripmate/config/kma-mid-term-regions.json
    TRIPMATE_DATA_GO_SERVICE_KEY: ${TRIPMATE_DATA_GO_SERVICE_KEY:-}
    TRIPMATE_KMA_SHORT_TERM_REQUEST_DELAY_SECONDS: ${TRIPMATE_KMA_SHORT_TERM_REQUEST_DELAY_SECONDS:-1.0}
    TRIPMATE_KMA_SHORT_TERM_RATE_LIMIT_MAX_RETRIES: ${TRIPMATE_KMA_SHORT_TERM_RATE_LIMIT_MAX_RETRIES:-2}
    TRIPMATE_KMA_SHORT_TERM_RATE_LIMIT_BACKOFF_SECONDS: ${TRIPMATE_KMA_SHORT_TERM_RATE_LIMIT_BACKOFF_SECONDS:-300}
    TRIPMATE_KHOA_API_KEY: ${TRIPMATE_KHOA_API_KEY:-}
    TRIPMATE_MOF_BEACH_SERVICE_KEY: ${TRIPMATE_MOF_BEACH_SERVICE_KEY:-}
    TRIPMATE_OPINET_API_KEY: ${TRIPMATE_OPINET_API_KEY:-}
    TRIPMATE_EXPRESSWAY_API_KEY: ${TRIPMATE_EXPRESSWAY_API_KEY:-}
    TRIPMATE_KMA_TOUR_COURSE_SOURCE_PATH: ${TRIPMATE_KMA_TOUR_COURSE_SOURCE_PATH:-}
    TRIPMATE_RUSTFS_ENDPOINT_URL: http://rustfs:9000
    TRIPMATE_RUSTFS_PUBLIC_ENDPOINT_URL: http://127.0.0.1:${TRIPMATE_RUSTFS_PORT:-19000}
    TRIPMATE_RUSTFS_BUCKET: ${TRIPMATE_RUSTFS_BUCKET:-tripmate-media}
    TRIPMATE_RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-tripmate-dev-access}
    TRIPMATE_RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-tripmate-dev-secret-change-me}
  volumes:
    - ../apps/api:/app
    - ../config:/opt/tripmate/config:ro
    - ../dataset:/opt/tripmate/dataset:ro
    - ../.tmp/dagster-downloads:/opt/tripmate/.tmp/dagster-downloads
    - ../.tmp/dagster-logs:/opt/tripmate/.tmp/dagster-logs
    - ../.tmp/etl-soak:/opt/tripmate/.tmp/etl-soak
    - dagster_home:/opt/dagster/dagster_home
  depends_on:
    postgres:
      condition: service_healthy
    rustfs-init:
      condition: service_completed_successfully

services:
  postgres:
    image: postgis/postgis:16-3.5
    container_name: tripmate-postgres
    environment:
      POSTGRES_DB: tripmate
      POSTGRES_USER: tripmate
      POSTGRES_PASSWORD: tripmate_dev_password
    ports:
      - "55432:5432"
    volumes:
      - tripmate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripmate -d tripmate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dagster:
    <<: *dagster-common
    command:
      [
        "dagster",
        "dev",
        "-m",
        "app.dagster_etl.definitions",
        "-h",
        "0.0.0.0",
        "-p",
        "3000",
      ]
    ports:
      - "${TRIPMATE_DAGSTER_PORT:-23000}:3000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: tripmate-rustfs
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-tripmate-dev-access}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-tripmate-dev-secret-change-me}
      RUSTFS_CONSOLE_ENABLE: "true"
    command: ["--address", ":9000", "--console-enable", "/data"]
    ports:
      - "${TRIPMATE_RUSTFS_PORT:-19000}:9000"
      - "${TRIPMATE_RUSTFS_CONSOLE_PORT:-19001}:9001"
    volumes:
      - tripmate_rustfs_data:/data
    restart: unless-stopped

  rustfs-init:
    image: minio/mc:latest
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-tripmate-dev-access}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-tripmate-dev-secret-change-me}
      TRIPMATE_RUSTFS_BUCKET: ${TRIPMATE_RUSTFS_BUCKET:-tripmate-media}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for i in $$(seq 1 30); do
          if mc alias set rustfs http://rustfs:9000 "$$RUSTFS_ACCESS_KEY" "$$RUSTFS_SECRET_KEY"; then
            mc mb -p "rustfs/$$TRIPMATE_RUSTFS_BUCKET" || true
            exit 0
          fi
          sleep 2
        done
        exit 1
    depends_on:
      - rustfs

  api:
    profiles: ["admin"]
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    image: tripmate-api:local
    environment:
      PYTHONPATH: /app
      TRIPMATE_DATABASE_URL: postgresql+psycopg://tripmate:tripmate_dev_password@postgres:5432/tripmate
      TRIPMATE_CORS_ORIGINS: '["http://localhost:${TRIPMATE_WEB_PORT:-13082}","http://127.0.0.1:${TRIPMATE_WEB_PORT:-13082}"]'
      TRIPMATE_RUSTFS_ENDPOINT_URL: http://rustfs:9000
      TRIPMATE_RUSTFS_PUBLIC_ENDPOINT_URL: http://127.0.0.1:${TRIPMATE_RUSTFS_PORT:-19000}
      TRIPMATE_RUSTFS_BUCKET: ${TRIPMATE_RUSTFS_BUCKET:-tripmate-media}
      TRIPMATE_RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-tripmate-dev-access}
      TRIPMATE_RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-tripmate-dev-secret-change-me}
    ports:
      - "${TRIPMATE_API_PORT:-18082}:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully

  web:
    profiles: ["admin"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_TRIPMATE_API_URL: ${NEXT_PUBLIC_TRIPMATE_API_URL:-http://127.0.0.1:18082}
        NEXT_PUBLIC_TRIPMATE_DAGSTER_URL: ${NEXT_PUBLIC_TRIPMATE_DAGSTER_URL:-http://127.0.0.1:23000}
    image: tripmate-web:local
    environment:
      NEXT_PUBLIC_TRIPMATE_API_URL: ${NEXT_PUBLIC_TRIPMATE_API_URL:-http://127.0.0.1:18082}
      NEXT_PUBLIC_TRIPMATE_DAGSTER_URL: ${NEXT_PUBLIC_TRIPMATE_DAGSTER_URL:-http://127.0.0.1:23000}
    ports:
      - "${TRIPMATE_WEB_PORT:-13082}:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  tripmate_postgres_data:
  tripmate_rustfs_data:
  dagster_home:
