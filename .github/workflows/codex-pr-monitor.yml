name: Codex PR Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: codex-pr-monitor
  cancel-in-progress: false

jobs:
  discover:
    name: Discover pull requests needing review
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    outputs:
      has_prs: ${{ steps.discover.outputs.has_prs }}
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Find open PRs without current Codex review
        id: discover
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const include = [];
            for (const pr of prs) {
              if (pr.draft) {
                continue;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100,
              });

              const marker = `codex-pr-review:head=${pr.head.sha}`;
              const alreadyReviewed = comments.some((comment) => comment.body?.includes(marker));
              if (alreadyReviewed) {
                continue;
              }

              include.push({
                pr_number: pr.number,
                base_ref: pr.base.ref,
                base_sha: pr.base.sha,
                head_sha: pr.head.sha,
                title: pr.title,
                body: pr.body || "",
              });
            }

            core.setOutput("has_prs", include.length > 0 ? "true" : "false");
            core.setOutput("matrix", JSON.stringify({ include }));

  review:
    name: Review PR #${{ matrix.pr_number }}
    needs: discover
    if: needs.discover.outputs.has_prs == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout pull request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ matrix.pr_number }}/merge
          persist-credentials: false

      - name: Fetch review refs
        env:
          PR_BASE_REF: ${{ matrix.base_ref }}
          PR_NUMBER: ${{ matrix.pr_number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            You are reviewing PR #${{ matrix.pr_number }} for ${{ github.repository }}.

            This scheduled monitor runs every 5 minutes. Review this PR because the latest head SHA
            does not yet have a Codex review marker.

            Review only the changes introduced by this pull request:
              git diff --stat ${{ matrix.base_sha }}...${{ matrix.head_sha }}
              git diff --find-renames ${{ matrix.base_sha }}...${{ matrix.head_sha }}

            Follow the repository instructions in AGENTS.md, SKILL.md, docs/agent-guide.md,
            and docs/runbooks/pr-review-sprint4.md.

            Until Sprint 4 is completed, review PRs with a long-term architecture stance:
            - Do not optimize for the smallest diff when a structural change is clearly better for Sprint 1-4 goals.
            - Prefer changes that preserve clean module boundaries, dependency direction, and future Sprint 4 map/UI work.
            - If the correct fix belongs in a base library such as python-krtour-map, maplibre-vworld-js,
              python-kraddr-*, or a provider library, call that out as a required upstream library PR before merge.
            - Flag cases where TripMate is adding wrappers, adapters, schema ownership, provider parsing,
              map behavior, or category logic that should live in the owning library instead.

            Use a code-review stance:
            - Prioritize bugs, security risks, behavioral regressions, missing tests, and repository policy violations.
            - Lead with findings ordered by severity.
            - Include exact file paths and line references when possible.
            - Keep the review detailed enough that the next agent can implement the fix without rediscovery.
            - If there are no issues, say so clearly and mention any residual test risk.
            - Include sections for findings, required code changes, base-library sync, verification, and merge readiness.
            - Write the final review comment in Korean.

            Pull request title and body:
            ----
            ${{ matrix.title }}
            ${{ matrix.body }}

      - name: Comment with Codex review
        if: steps.codex.outputs['final-message'] != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs['final-message'] }}
          PR_HEAD_SHA: ${{ matrix.head_sha }}
          PR_NUMBER: ${{ matrix.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `${process.env.CODEX_FINAL_MESSAGE}\n\n<!-- codex-pr-review:head=${process.env.PR_HEAD_SHA} -->`,
            });
