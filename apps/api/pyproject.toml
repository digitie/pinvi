[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tripmate-api"
version = "0.1.0"
description = "FastAPI backend for TripMate"
requires-python = ">=3.12"
dependencies = [
  "alembic>=1.17.0",
  "fastapi>=0.124.0",
  "geoalchemy2>=0.18.0",
  "httpx>=0.28.0",
  "kex-openapi @ git+https://github.com/digitie/pykex.git@329d5a1219a8f41a83448d619a33fcaf6da23f13",
  "opinet @ git+https://github.com/digitie/pyopinet.git@ee4998eec98deabc69edc40f76fda1aa6ad4519a",
  "pykrtourapi @ git+https://github.com/digitie/pykrtourapi.git@6fd0601ad01d6cdef59ca3d46cb1df3b6b697e59",
  "pyproj>=3.7.0",
  "pyshp>=2.3.1",
  "psycopg[binary]>=3.3.0",
  "pydantic-settings>=2.12.0",
  "shapely>=2.1.0",
  "sqlalchemy>=2.0.45",
  "uvicorn[standard]>=0.38.0",
]

[dependency-groups]
dev = [
  "mypy>=1.19.0",
  "pytest>=9.0.0",
  "ruff>=0.14.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
plugins = ["sqlalchemy.ext.mypy.plugin"]
strict = true
warn_unused_ignores = true
warn_return_any = true
disallow_any_generics = false
exclude = "^\\.venv(-wsl)?/"

[[tool.mypy.overrides]]
module = ["shapefile", "shapely.*"]
ignore_missing_imports = true

[tool.setuptools.packages.find]
include = ["app*"]
